# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Antarctic Metadata Catalogue
author: Mike Meredyth-Young
logo: logo.png

# No executable notebooks in this book
execute:
  execute_notebooks: off

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Information about where the book exists on the web
# TODO: update url to the actual repository once confirmed
repository:
  url: https://github.com/executablebooks/jupyter-book
  path_to_book: docs
  branch: main

# GitHub buttons – disabled until the repository URL is confirmed
html:
  use_issues_button: false
  use_repository_button: false

# Sphinx configuration
sphinx:
  extra_extensions:
    - sphinx_design
  config:
    html_css_files:
      - custom.css
    html_show_copyright: false

# Set the baseurl for GitHub Pages deployment
baseurl: "/antcat_docs"

# Optional: Specify a Jekyll theme
theme: jekyll-theme-minimal
